# Orbit Advancement — Nginx site config
# Place in config/nginx-site.conf

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_ai:10m      rate=1r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name api.orbit.ai;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.orbit.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.orbit.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    # Health check (no rate limit, no auth)
    location = /health {
        proxy_pass http://api:3001/health;
        access_log off;
    }

    # Auth endpoints — strict rate limit
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3001;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # AI endpoints — tighter rate limit
    location /api/v1/ai/ {
        limit_req zone=api_ai burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3001;
        proxy_read_timeout 60s;  # AI can be slow
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3001;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Frontend static files
    location / {
        root /var/www/orbit-app;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }
}
