version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Orbit Platform — docker-compose.yml
#
# Profiles:
#   (default)  postgres + redis + api
#   backup     one-shot pg_dump to ./backups/
#
# Usage:
#   docker compose up -d                        # start everything
#   docker compose logs -f api                  # tail API logs
#   docker compose --profile backup up backup   # manual backup
#   docker compose down -v                      # destroy + wipe volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbit_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit} -d ${POSTGRES_DB:-orbit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orbit-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-orbit_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-orbit_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orbit-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Orbit API (Express + TypeScript) ───────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: orbit-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD:-orbit_dev_password}@postgres:5432/${POSTGRES_DB:-orbit}
      REDIS_URL: redis://:${REDIS_PASSWORD:-orbit_redis_dev}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-5}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY}
      DOCUSIGN_USER_ID: ${DOCUSIGN_USER_ID}
      DOCUSIGN_ACCOUNT_ID: ${DOCUSIGN_ACCOUNT_ID}
      SALESFORCE_CLIENT_ID: ${SALESFORCE_CLIENT_ID}
      SALESFORCE_CLIENT_SECRET: ${SALESFORCE_CLIENT_SECRET}
      SALESFORCE_INSTANCE_URL: ${SALESFORCE_INSTANCE_URL}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      # Mount logs directory so host can read them without exec-ing into container
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - orbit-internal
      - orbit-external
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Backup (profile: backup) ───────────────────────────────────────────────
  # Run on demand: docker compose --profile backup up backup
  # Output: ./backups/orbit_YYYYMMDD_HHMMSS.dump (pg_dump custom format)
  backup:
    profiles: ["backup"]
    image: postgres:16-alpine
    container_name: orbit-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-orbit_dev_password}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        FILENAME=/backups/orbit_$$(date +%Y%m%d_%H%M%S).dump &&
        pg_dump
          --host=postgres
          --port=5432
          --username=${POSTGRES_USER:-orbit}
          --dbname=${POSTGRES_DB:-orbit}
          --format=custom
          --compress=9
          --verbose
          $$FILENAME &&
        echo \"Backup complete: $$FILENAME\" &&
        ls -lh /backups/ | tail -5
      "
    networks:
      - orbit-internal

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Internal: postgres + redis + api can talk to each other
  orbit-internal:
    driver: bridge
    internal: false

  # External: only the API is exposed to host/internet
  orbit-external:
    driver: bridge
