══════════════════════════════════════════════════════ */
async function callClaude(system, user, maxTokens = 600) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system,
      messages: [{ role: 'user', content: user }],
    }),
  });
  if (!res.ok) throw new Error('API ' + res.status);
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

/* ══════════════════════════════════════════════════════
   TOAST SYSTEM
══════════════════════════════════════════════════════ */
let _toastSetFn = null;
function addToast(msg, type = 'success', icon = '✓') {
  if (_toastSetFn) _toastSetFn(t => [...t, { id: Date.now(), msg, type, icon }].slice(-4));
}
function ToastStack() {
  const [toasts, setToasts] = useState([]);
  _toastSetFn = setToasts;
  useEffect(() => {
    if (!toasts.length) return;
    const t = setTimeout(() => setToasts(ts => ts.slice(1)), 3500);
    return () => clearTimeout(t);
  }, [toasts]);
  const BG = { success: '#16a34a', error: '#dc2626', warning: '#d97706', info: '#1d4ed8' };
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className="toast" style={{ background: BG[t.type] || BG.success }}>
          <span>{t.icon}</span><span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

function AIConsolePage({ org }) {
  const [activePersona, setActivePersona] = useState('director');
  const [query, setQuery] = useState('');
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const [selectedMember, setSelectedMember] = useState(MEMBERS[1]); // James (at-risk)

  const QUICK_ACTIONS = {
    director: [
      'What is our renewal rate trend and what does it mean for annual revenue?',
      'Which membership tier has the worst first-year retention and why?',
      'Draft a board report summary on membership health for this quarter.',
      'What non-dues revenue opportunities should we prioritize?',
    ],
    coordinator: [
      `Generate a personalized intervention plan for ${selectedMember.name} (lapse risk: ${selectedMember.lapseProbability}%)`,
      'Which members are renewing in the next 2 weeks and what do I know about each?',
      'Create a win-back outreach plan for our lapsed member segment.',
      'What does a perfect 30-60-90 day onboarding look like for a new member?',
    ],
    comms: [
      `Write a renewal email for a member with ${selectedMember.daysToRenewal || 18} days left — tone: warm but urgent`,
      'Create a 5-email welcome sequence for a new young alumni member.',
      'Write a lapse recovery message that doesn\'t sound like nagging.',
      'Draft an upgrade ask for a Standard member who has been engaged for 3+ years.',
    ],
  };

  async function askOfficer(q) {
    if (!q.trim()) return;
    const p = PERSONAS[activePersona];
    setLoading(true); setResponse(null);
    setHistory(h => [...h, { persona: activePersona, query: q }]);
    try {
      const r = await callClaude(
        `You are ${p.name}, ${p.title} for ${org.name}. ${p.voice}
You have deep expertise in membership management, dues retention, alumni engagement, and association best practices.
Answer with authority, specificity, and actionable recommendations. Be concise but complete.
Current org data: ${org.paidMembers} paid members, ${org.renewalRate}% renewal rate, ${org.firstYearRate}% first-year renewal.`,
        q,
        520
      );
      setResponse({ persona: activePersona, text: r.trim() });
    } catch (e) {
      setResponse({ persona: activePersona, text: 'Unable to connect to AI — please check your API key.' });
    }
    setLoading(false);
  }

  const p = PERSONAS[activePersona];

  return (
    <div className="fade-in" style={{ padding: '28px 32px', overflow: 'auto', height: '100%' }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontWeight: 700, color: 'var(--ink)', marginBottom: 6 }}>AI Officer Console</h1>
        <p style={{ fontSize: 13, color: 'var(--ink-45)' }}>Three specialized officers. One unified intelligence. Ask anything about your membership.</p>
      </div>

      {/* Persona selector */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 24 }}>
        {Object.values(PERSONAS).map(persona => (
          <div key={persona.id} onClick={() => setActivePersona(persona.id)} style={{
            flex: 1, padding: '16px', borderRadius: 'var(--radius-lg)', cursor: 'pointer',
            border: `2px solid ${activePersona === persona.id ? persona.color : 'var(--ink-08)'}`,
            background: activePersona === persona.id ? persona.dimColor : 'var(--surface)',
            transition: 'all 0.2s',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 24 }}>{persona.icon}</span>
              <div>
                <div style={{ fontSize: 14, fontWeight: 800, color: activePersona === persona.id ? persona.color : 'var(--ink)', fontFamily: 'var(--font-display)' }}>{persona.name}</div>
                <div style={{ fontSize: 10, color: 'var(--ink-45)' }}>{persona.title}</div>
              </div>
              {activePersona === persona.id && <span className="pulsedot" style={{ marginLeft: 'auto', background: persona.color, boxShadow: `0 0 0 0 ${persona.color}60` }} />}
            </div>
            <div style={{ fontSize: 11, color: 'var(--ink-45)', lineHeight: 1.5 }}>{persona.focus}</div>
          </div>
        ))}
      </div>

      <div className="grid-2" style={{ alignItems: 'start' }}>
        {/* Left: Quick actions + input */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-20)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>Quick Actions</div>
          {QUICK_ACTIONS[activePersona].map((q, i) => (
            <button key={i} onClick={() => { setQuery(q); askOfficer(q); }} style={{
              width: '100%', textAlign: 'left', padding: '10px 14px', borderRadius: 8, marginBottom: 7,
              background: 'var(--surface)', border: `1px solid var(--ink-08)`,
              color: 'var(--ink-70)', fontSize: 12, cursor: 'pointer', lineHeight: 1.5,
              transition: 'all 0.15s',
            }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = p.color; e.currentTarget.style.color = 'var(--ink)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--ink-08)'; e.currentTarget.style.color = 'var(--ink-70)'; }}>
              {q.length > 70 ? q.slice(0, 70) + '...' : q}
            </button>
          ))}

          {/* Custom query */}
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-20)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>Ask {p.name} Directly</div>
            <textarea value={query} onChange={e => setQuery(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) askOfficer(query); }}
              placeholder={`Ask ${p.name} anything about your membership...`}
              rows={3} style={{
                width: '100%', padding: '12px 14px', borderRadius: 10,
                border: `1.5px solid ${p.color}40`, background: 'var(--surface)',
                color: 'var(--ink)', fontSize: 12, outline: 'none', resize: 'none',
                lineHeight: 1.6, fontFamily: 'var(--font-body)',
              }} />
            <button onClick={() => askOfficer(query)} disabled={loading || !query.trim()}
              className="btn-gold" style={{ marginTop: 8, background: p.color, width: '100%', padding: '10px' }}>
              {loading ? `${p.icon} ${p.name} is thinking...` : `Ask ${p.name} →`}
            </button>
            <div style={{ fontSize: 10, color: 'var(--ink-20)', marginTop: 6, textAlign: 'center' }}>⌘ + Enter to submit</div>
          </div>
        </div>

        {/* Right: Response */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-20)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>Response</div>

          {loading && (
            <div className="card" style={{ padding: 24 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <span style={{ fontSize: 24 }}>{p.icon}</span>
                <div style={{ fontSize: 13, color: 'var(--ink-45)' }}>{p.name} is analyzing your membership data...</div>
              </div>
              {[90, 70, 85, 55, 75].map((w, i) => (
                <div key={i} className="skeleton" style={{ height: 14, width: w + '%', marginBottom: 10 }} />
              ))}
            </div>
          )}

          {response && !loading && (
            <div className="fade-in">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <PersonaBadge personaId={response.persona} />
              </div>
              <div className="ai-response">{response.text}</div>
              <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                <button className="btn-ghost" style={{ fontSize: 10, padding: '6px 12px' }}
                  onClick={() => { navigator.clipboard?.writeText(response.text); addToast('Copied to clipboard', 'success', '📋'); }}>
                  📋 Copy
                </button>
                <button className="btn-ghost" style={{ fontSize: 10, padding: '6px 12px' }}
                  onClick={() => addToast('Saved to playbook', 'success', '💾')}>
                  💾 Save to Playbook
                </button>
              </div>
            </div>
          )}

          {!response && !loading && (
            <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--ink-20)' }}>
              <div style={{ fontSize: 48, marginBottom: 14 }}>{p.icon}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--ink-45)', marginBottom: 8 }}>{p.name} is ready</div>
              <div style={{ fontSize: 12, lineHeight: 1.6 }}>Select a quick action or ask a custom question to get personalized membership intelligence.</div>
            </div>
          )}

          {/* History */}
          {history.length > 0 && (
            <div style={{ marginTop: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-20)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>Session History</div>
              {history.slice(-3).map((h, i) => {
                const hp = PERSONAS[h.persona];
                return (
                  <div key={i} style={{ padding: '7px 10px', marginBottom: 5, borderRadius: 7, background: 'var(--surface)', fontSize: 11, color: 'var(--ink-45)', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                    <span>{hp.icon}</span>
                    <span style={{ flex: 1 }}>{h.query.slice(0, 80)}...</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MembersPage({ org }) {
  const [selected, setSelected] = useState(MEMBERS[0]);
  const [memberInsight, setMemberInsight] = useState(null);
  const [insightLoading, setInsightLoading] = useState(false);

  const statusColors = { active: '#34d399', at_risk: '#fbbf24', lapsed: '#f87171' };

  const filtered = MEMBERS.filter(m => {
    const matchSearch = !search || m.name.toLowerCase().includes(search.toLowerCase());
    const matchStatus = filterStatus === 'all' || m.status === filterStatus;
    return matchSearch && matchStatus;
  });

  async function getMemberInsight(member) {
    setMemberInsight(null); setInsightLoading(true);
    try {
      const r = await callClaude(
        `You are Scout, Membership Coordinator. Write a sharp 4-part member intelligence report:
1. SITUATION SUMMARY (1 sentence on where this member stands)
2. LAPSE RISK ANALYSIS (why they are at this risk level — be specific)
3. RECOMMENDED NEXT ACTION (ONE specific action to take this week)
4. COMMUNICATION SCRIPT (3-4 sentence email or message to send — write it ready to use)

Be direct and specific. Use the data provided.`,
        `Member: ${member.name}
Class/Join Year: ${member.classYear} | Tier: ${member.tier}
Engagement Score: ${member.score}/100 | Lapse Probability: ${member.lapseProbability}%
Status: ${member.status} | Days to renewal: ${member.daysToRenewal || 'N/A (lapsed)'}
Last login: ${member.lastLogin} days ago | Events YTD: ${member.eventsYTD}
Email open rate: ${member.emailsOpened}% | Employer: ${member.employer}`,
        380
      );

function SequencesPage({ org }) {
  const [selected, setSelected] = useState(COMM_SEQUENCES[0]);
  const [draft, setDraft] = useState(null);
  const [draftLoading, setDraftLoading] = useState(false);

  async function generateSequenceDraft(seq) {
    setDraft(null); setDraftLoading(true);
    try {
      const r = await callClaude(
        `You are Echo, Membership Communications Officer for ${org.name}. Write a complete ${seq.name} for a ${org.type} association.

Format each step clearly:
EMAIL [N] — [timing/trigger]
Subject: [subject]
Preview: [preheader, 40 chars]
Body: [2-3 paragraphs, conversational and personal, never generic]
CTA: [specific action button text]
---

Write all ${seq.steps} emails in sequence. Each should build on the previous one. Vary the tone and angle across emails. Never repeat the same value point twice.`,
        `Sequence: ${seq.name}
Trigger: ${seq.trigger}
Steps: ${seq.steps}
Org: ${org.name} (${org.type})`,
        700
      );
      setDraft(r.trim());
    } catch (e) { setDraft('Unable to generate — check API.'); }
    setDraftLoading(false);
  }

  return (
    <div className="fade-in" style={{ padding: '28px 32px', overflow: 'auto', height: '100%' }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontWeight: 700, color: 'var(--ink)', marginBottom: 4 }}>Communication Sequences</h1>
        <p style={{ fontSize: 13, color: 'var(--ink-45)' }}>Behavior-triggered, AI-written sequences that run 24/7 — not calendar-triggered spray-and-pray</p>
      </div>

      {/* The key differentiation callout */}
      <div className="card-gold" style={{ marginBottom: 20, display: 'flex', gap: 20, alignItems: 'center' }}>
        <span style={{ fontSize: 32 }}>📣</span>
        <div>
          <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--gold)', marginBottom: 4 }}>The Echo Difference: Behavior-Triggered, Not Date-Triggered</div>
          <div style={{ fontSize: 12, color: 'var(--ink-70)', lineHeight: 1.6 }}>
            WildApricot, MemberClicks, and most AMS send emails on a calendar — "30 days to renewal." Echo monitors engagement behavior in real time. A member who logs in after 90 days of silence triggers a different sequence than one who just attended their third event. Same renewal date, completely different message. That is why our sequences outperform date-triggered systems by 40%+ on open rates.
          </div>
        </div>
      </div>

      <div className="grid-2" style={{ alignItems: 'start' }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-20)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>Active Sequences</div>
          {COMM_SEQUENCES.map(seq => (
            <div key={seq.id} onClick={() => setSelected(seq)} style={{
              padding: '14px 16px', borderRadius: 'var(--radius)', marginBottom: 8, cursor: 'pointer',
              border: `1.5px solid ${selected?.id === seq.id ? 'var(--sky)' : 'var(--ink-08)'}`,
              background: selected?.id === seq.id ? 'rgba(96,165,250,0.08)' : 'var(--surface)',
              transition: 'all 0.15s',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink)', marginBottom: 2 }}>{seq.name}</div>
                  <div style={{ fontSize: 10, color: 'var(--ink-45)' }}>Trigger: {seq.trigger}</div>
                </div>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, background: seq.active ? 'var(--emerald-dim)' : 'var(--surface-2)', color: seq.active ? 'var(--emerald)' : 'var(--ink-20)', fontWeight: 700, fontFamily: 'var(--font-mono)' }}>{seq.active ? 'LIVE' : 'DRAFT'}</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 16, fontSize: 11 }}>
                <div><span style={{ color: 'var(--ink-20)' }}>Steps: </span><span style={{ color: 'var(--ink)', fontWeight: 700 }}>{seq.steps}</span></div>
                {seq.active && (<>
                  <div><span style={{ color: 'var(--ink-20)' }}>Sent MTD: </span><span style={{ color: 'var(--sky)', fontWeight: 700, fontFamily: 'var(--font-mono)' }}>{seq.sentMTD}</span></div>
                  <div><span style={{ color: 'var(--ink-20)' }}>Open rate: </span><span style={{ color: seq.openRate >= 50 ? 'var(--emerald)' : seq.openRate >= 30 ? 'var(--gold)' : 'var(--rose)', fontWeight: 700, fontFamily: 'var(--font-mono)' }}>{seq.openRate}%</span></div>
                </>)}
              </div>
            </div>
          ))}
          <button onClick={() => addToast('New sequence builder opened', 'info', '✨')} className="btn-ghost" style={{ width: '100%', marginTop: 4, padding: '9px', fontSize: 11 }}>
            + Create New Sequence
          </button>
        </div>

        <div>
          {selected && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <PersonaBadge personaId="comms" />
                <button onClick={() => generateSequenceDraft(selected)} disabled={draftLoading} className="btn-gold" style={{ fontSize: 11, padding: '7px 14px' }}>
                  {draftLoading ? '✍️ Writing...' : '✍️ Generate All Emails'}
                </button>
              </div>

              {draftLoading && (
                <div className="card">{[90, 70, 85, 60, 80, 55, 75].map((w, i) => <div key={i} className="skeleton" style={{ height: 13, width: w + '%', marginBottom: 10 }} />)}</div>
              )}

              {draft && !draftLoading && (
                <div className="fade-in">
                  <div style={{ fontFamily: 'Georgia, serif', fontSize: 12, lineHeight: 1.85, color: 'var(--ink-70)', whiteSpace: 'pre-wrap', background: 'var(--surface)', border: '1px solid var(--navy-border)', borderRadius: 'var(--radius)', padding: '18px', maxHeight: 520, overflowY: 'auto', marginBottom: 10 }}>
                    {draft}
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn-gold" style={{ flex: 1, padding: '9px', fontSize: 11 }} onClick={() => addToast('Sequence saved and activated', 'success', '🚀')}>
                      Activate Sequence
                    </button>
                    <button className="btn-ghost" style={{ padding: '9px 14px', fontSize: 11 }} onClick={() => { navigator.clipboard?.writeText(draft); addToast('Copied!', 'success', '📋'); }}>Copy All</button>
                  </div>
                </div>
              )}

              {!draft && !draftLoading && (
                <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--ink-20)' }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>📧</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--ink-45)', marginBottom: 6 }}>Ready to generate</div>
                  <div style={{ fontSize: 11, lineHeight: 1.6 }}>Click "Generate All Emails" and Echo will write the complete {selected.steps}-email {selected.name} — ready to activate.</div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                </div>
              </div>
              <div style={{ height: 6, background: 'var(--ink-08)', borderRadius: 3, overflow: 'hidden', position: 'relative' }}>
                <div style={{ position: 'absolute', left: Math.min(b.benchmark, 100) + '%', top: 0, bottom: 0, width: 2, background: 'var(--ink-20)', zIndex: 1, transform: 'translateX(-50%)' }} />
                <div className="progress-fill" style={{ width: Math.min(b.ours, 100) + '%', background: b.ours >= b.benchmark ? 'var(--emerald)' : 'var(--rose)' }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════

              { label: 'Grace Period',        val: '30 days post-expiry' },

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('overview');
  const [org, setOrg] = useState(ORG_PROFILES.alumni);

  const PAGE_MAP = {
    overview:    () => <OverviewPage org={org} />,
    ai_officers: () => <AIConsolePage org={org} />,
    members:     () => <MembersPage org={org} />,
    segments:    () => <PlaceholderPage title="Segments & Scoring" subtitle="AI-powered member cohort builder with behavioral scoring and tier migration recommendations." icon="🎯" />,
    lapse:       () => <LapsePage org={org} />,
    dues:        () => <DuesPage org={org} />,
    pipeline:    () => <PlaceholderPage title="Revenue Pipeline" subtitle="Multi-year dues forecasting, upgrade potential scoring, and non-dues revenue modeling." icon="📈" />,
    sequences:   () => <SequencesPage org={org} />,
    campaigns:   () => <PlaceholderPage title="Campaigns" subtitle="Multi-channel membership campaigns with A/B testing, timing optimization, and Scout/Echo co-creation." icon="🗂" />,
    events:      () => <PlaceholderPage title="Events & Benefits" subtitle="Event-driven engagement tracking, benefit utilization analytics, and automatic ladder progression." icon="📅" />,
    analytics:   () => <AnalyticsPage org={org} />,
    benchmarks:  () => <BenchmarksPage org={org} />,
    settings:    () => <SettingsPage org={org} setOrg={setOrg} />,
  };

  const PageComponent = PAGE_MAP[page] || PAGE_MAP.overview;

  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden' }}>
      <Sidebar page={page} setPage={setPage} org={org} />
      <div style={{ flex: 1, overflow: 'auto', background: 'var(--navy)' }}>
        {PageComponent()}
      </div>
      <ToastStack />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
