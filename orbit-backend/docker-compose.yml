version: "3.9"

# ═══════════════════════════════════════════════════════════
#  Orbit Advancement — Production Docker Compose
#
#  Services:
#   • api        — Node.js Express backend (port 3001)
#   • postgres   — PostgreSQL 15 database
#   • redis      — Redis 7 (rate limiting, sessions, queues)
#   • nginx      — Reverse proxy + SSL termination (ports 80/443)
#
#  Usage:
#   1. cp .env.production.template .env  (fill in all values)
#   2. docker compose up -d
#   3. docker compose logs -f api
# ═══════════════════════════════════════════════════════════

services:

  # ── API (Node.js) ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: orbit-api:latest
    container_name: orbit-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit_prod}
      REDIS_URL:    redis://redis:6379
    ports:
      - "3001:3001"    # Direct access (nginx proxies this in prod)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - orbit_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Resource limits (adjust per plan tier)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── PostgreSQL 15 ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: orbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-orbit_prod}
      # Performance tuning (adjust for your server RAM)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - orbit_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit} -d ${POSTGRES_DB:-orbit_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres NOT exposed to host network (security)
    # Access via: docker compose exec postgres psql -U orbit orbit_prod
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - orbit_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Redis NOT exposed to host network (security)

  # ── Nginx reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orbit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
      # Frontend static files (orbit-dashboard.html)
      - ./public:/var/www/orbit-app:ro
    depends_on:
      - api
    networks:
      - orbit_internal
      - orbit_external
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s

  # ── Daily database backup ───────────────────────────────────────
  backup:
    image: postgres:15-alpine
    container_name: orbit-backup
    restart: "no"
    profiles: ["backup"]   # Only runs when: docker compose --profile backup up backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "pg_dump -h postgres -U ${POSTGRES_USER:-orbit} ${POSTGRES_DB:-orbit_prod}
             | gzip > /backups/orbit_$(date +%Y%m%d_%H%M%S).sql.gz
             && echo 'Backup complete'
             && ls -lh /backups/"
    volumes:
      - ./backups:/backups
    depends_on:
      - postgres
    networks:
      - orbit_internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local
  ssl_certs:
    driver: local

networks:
  orbit_internal:
    driver: bridge
    internal: true        # No direct internet access (security)
  orbit_external:
    driver: bridge        # Only nginx can reach internet
