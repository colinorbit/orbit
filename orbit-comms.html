// ─── Toast system ───────────────────────────────────────────────
let _toastFn = null;
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  _toastFn = (msg, type, icon) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, t: type||'success', i: icon||'✓' }]);
    setTimeout(() => setToasts(p => p.filter(x => x.id !== id)), 3800);
  };
  return (
    <>
      {children}
      <div className="tw">
        {toasts.map(x => (
          <div key={x.id} className={"toast " + x.t}>
            <span style={{fontSize:16}}>{x.i}</span>
            <span>{x.msg}</span>
          </div>
        ))}
      </div>
    </>
  );
}
function toast(msg, type, icon) { _toastFn && _toastFn(msg, type, icon); }

// ─── Claude API ────────────────────────────────────────────────
async function callClaude(system, user, maxTokens) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens || 800,
      system: system || '',
      messages: [{ role: 'user', content: user }],
    }),
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error?.message || 'API error');
  return d.content?.[0]?.text || '';
}

function fillVars(txt, fname) {
  const f=fname||'Margaret';
  return (txt||'').replace(/{{first_name}}/g,f).replace(/{{last_name}}/g,'Kessler')
    .replace(/{{full_name}}/g,f+' Kessler').replace(/{{class_year}}/g,"'09")
    .replace(/{{last_gift_amount}}/g,'$2,500').replace(/{{last_gift_date}}/g,'March 3, 2025')
    .replace(/{{giving_total}}/g,'$18,750').replace(/{{fund_name}}/g,'Greenfield Scholarship Fund')
    .replace(/{{university}}/g,'Greenfield University').replace(/{{agent_name}}/g,'Dr. Sarah Chen')
    .replace(/{{event_name}}/g,'Founders Gala 2026').replace(/{{campaign_goal}}/g,'$500,000')
    .replace(/{{progress_pct}}/g,'72').replace(/{{giving_url}}/g,'give.greenfield.edu')
    .replace(/{{unsubscribe_link}}/g,'#unsubscribe')
    .replace(/{{impact_statement}}/g,'Your gift supported 40 students this semester')
    .replace(/{{[^}]+}}/g,'[token]');
}

// ─── Block Preview (email canvas rendering) ─────────────────────
function BlockPreview({ block }) {
  const c = block.content || {};
  if (block.type==='header') return (
    <div style={{background:'#2a8c7e',padding:'18px 28px',textAlign:'center',color:'#fff'}}>
      <div style={{fontSize:20,fontWeight:800}}>{c.logo||'University'}</div>
      {c.tagline && <div style={{fontSize:11,opacity:.7,marginTop:2}}>{c.tagline}</div>}
    </div>
  );
  if (block.type==='body') return (
    <div style={{padding:'16px 28px',fontSize:14,lineHeight:1.8,color:'#374151',whiteSpace:'pre-wrap',fontFamily:'Georgia,serif'}}>
      {c.text||''}
    </div>
  );
  if (block.type==='impact') return (
    <div style={{margin:'8px 28px',padding:'16px 20px',background:'#e4f4f1',borderRadius:10,borderLeft:'4px solid #2a8c7e'}}>
      <div style={{fontSize:13,fontWeight:700,color:'#2a8c7e'}}>{c.headline||'Your Impact'}</div>
      <div style={{fontSize:12,color:'#374151',marginTop:4}}>{c.text||'Your generosity makes a difference every single day.'}</div>
    </div>
  );
  if (block.type==='cta') return (
    <div style={{textAlign:'center',padding:'16px 28px'}}>
      <span style={{background:c.color||'#2a8c7e',color:'#fff',padding:'12px 32px',borderRadius:28,fontSize:14,fontWeight:700,display:'inline-block'}}>{c.label||'Give Now'}</span>
    </div>
  );
  if (block.type==='story') return (
    <div style={{margin:'8px 28px',padding:'16px 20px',background:'#fdf2e4',borderRadius:10,borderLeft:'4px solid #c2853a',fontFamily:'Georgia,serif',fontStyle:'italic'}}>
      <div style={{fontSize:13,color:'#374151',lineHeight:1.7}}>{c.quote||'"Your gift changed my life."'}</div>
      <div style={{fontSize:11,color:'#c2853a',fontStyle:'normal',marginTop:6,fontWeight:700}}>{c.credit||'Student recipient'}</div>
    </div>
  );
  if (block.type==='stats') return (
    <div style={{display:'flex',margin:'8px 28px',border:'1px solid #f0f2f5',borderRadius:10,overflow:'hidden'}}>
      {[{val:'$847K',lbl:'Raised'},{val:'1,200',lbl:'Donors'},{val:'47',lbl:'Scholarships'}].map((s,i)=>(
        <div key={i} style={{flex:1,textAlign:'center',padding:'14px 8px',borderRight:i<2?'1px solid #f0f2f5':'none'}}>
          <div style={{fontSize:18,fontWeight:800,color:'#2a8c7e'}}>{s.val}</div>
          <div style={{fontSize:10,color:'#6b7280',marginTop:2}}>{s.lbl}</div>
        </div>
      ))}
    </div>
  );
  if (block.type==='divider') return <div style={{padding:'8px 28px'}}><div style={{height:1,background:'#f0f2f5'}}/></div>;
  if (block.type==='signature') return (
    <div style={{padding:'12px 28px 16px',fontFamily:'Georgia,serif',color:'#374151',borderTop:'1px solid #f0f2f5',marginTop:4}}>
      <div style={{fontSize:13,marginBottom:4}}>Warm regards,</div>
      <div style={{fontSize:14,fontWeight:700}}>{c.name||'Officer Name'}</div>
      <div style={{fontSize:12}}>{c.title||'Vice President for Advancement'}</div>
      <div style={{fontSize:12,color:'#9ca3af'}}>{c.uni||'University'}</div>
    </div>
  );
  if (block.type==='footer') return (
    <div style={{padding:'12px 28px',fontSize:10,color:'#9ca3af',textAlign:'center',borderTop:'1px solid #f0f2f5'}}>
      <div>{c.address||'University Office of Advancement'}</div>
      <div style={{marginTop:4}}>
        <a href="#" style={{color:'#6b7280',textDecoration:'none'}}>Unsubscribe</a>{' | '}
        <a href="#" style={{color:'#6b7280',textDecoration:'none'}}>Privacy Policy</a>{' | '}
        <a href="#" style={{color:'#6b7280',textDecoration:'none'}}>View in Browser</a>
      </div>
    </div>
  );
  return <div style={{padding:'10px 28px',textAlign:'center',color:'#9ca3af',fontSize:12}}>[{block.type}]</div>;
}

// ─── Block Property Editor ────────────────────────────────────

    <div style={{padding:24,textAlign:'center',color:'var(--ink45)'}}>
      <div style={{fontSize:36,marginBottom:8}}>👆</div>
      <div style={{fontSize:13,fontWeight:600}}>Click a block to edit it</div>
    </div>
  );
  const set = (k,v) => onChange({...block,content:{...block.content,[k]:v}});
  const C = block.content||{};
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--ink45)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14}}>Editing: {block.type}</div>
      {block.type==='header'&&<>
        <label className="fl">Logo/University Name</label>

        <label className="fl">Body Text</label>

          <span style={{fontSize:11,color:'var(--ink45)',fontFamily:'var(--mono)'}}>{C.color||'#2a8c7e'}</span>

      {block.type==='story'&&<>
        <label className="fl">Student Quote</label>
        <textarea className="fi fta" rows={4} style={{marginBottom:10}} value={C.quote||''} onChange={e=>set('quote',e.target.value)} placeholder={'"Your gift changed my life."'}/>
        <label className="fl">Attribution</label>
        <input className="fi" value={C.credit||''} onChange={e=>set('credit',e.target.value)} placeholder="Student recipient, Class of 2026"/>
      </>}
      {block.type==='signature'&&<>
        <label className="fl">Name</label>
        <input className="fi" style={{marginBottom:10}} value={C.name||''} onChange={e=>set('name',e.target.value)} placeholder="{{agent_name}}"/>
        <label className="fl">Title</label>
        <input className="fi" style={{marginBottom:10}} value={C.title||''} onChange={e=>set('title',e.target.value)} placeholder="Vice President for Advancement"/>
        <label className="fl">Institution</label>
        <input className="fi" value={C.uni||''} onChange={e=>set('uni',e.target.value)} placeholder="{{university}}"/>
      </>}
      {block.type==='footer'&&<>
        <label className="fl">Mailing Address</label>
        <input className="fi" style={{marginBottom:10}} value={C.address||''} onChange={e=>set('address',e.target.value)} placeholder="University Office of Advancement"/>

// ─── Email Designer ────────────────────────────────────────────
function EmailDesignerPage() {
  const [blocks,setBlocks] = useState(INIT_BLOCKS);
  const [selId,setSelId] = useState(null);
  const [subject,setSubject] = useState('A personal note, {{first_name}}');
  const [fromName,setFromName] = useState('{{agent_name}} at {{university}} Advancement');
  const [fromEmail,setFromEmail] = useState('advancement@greenfield.edu');
  const [replyTo,setReplyTo] = useState('advancement@greenfield.edu');
  const [prov,setProv] = useState('gmail');
  const [showToks,setShowToks] = useState(false);
  const [pane,setPane] = useState('design');
  const [aiTxt,setAiTxt] = useState('');
  const [aiLoading,setAiLoading] = useState(false);
  const [testEmail,setTestEmail] = useState('');
  const [showTest,setShowTest] = useState(false);
  const [prevFname,setPrevFname] = useState('Margaret');

  const selBlock = blocks.find(b=>b.id===selId)||null;

  function addBlock(type) {
    const defs={
      header:{logo:'{{university}}',tagline:'Office of Advancement'},
      body:{text:'Your support means everything to us and to the students of {{university}}.'},
      impact:{headline:'Your Impact',text:'Your gift supported 40 students this semester.'},
      cta:{label:'Give Now',url:'{{giving_url}}',color:'#2a8c7e'},
      story:{quote:'"I never thought I would be here. Your gift made this possible."',credit:'Scholarship Recipient, Class of 2026'},
      signature:{name:'{{agent_name}}',title:'Vice President for Advancement',uni:'{{university}}'},
      footer:{address:'{{university}}, Office of Advancement, 100 University Drive',unsub:'{{unsubscribe_link}}'},
    };
    const id=type+'_'+Date.now();
    setBlocks(p=>[...p,{id,type,content:defs[type]||{}}]);
    setSelId(id);
    toast('Block added','success','➕');
  }

  function removeBlock(id){setBlocks(p=>p.filter(b=>b.id!==id));if(selId===id)setSelId(null);}
  function moveBlock(id,dir){
    setBlocks(p=>{
      const i=p.findIndex(b=>b.id===id),arr=[...p],j=i+dir;
      if(j<0||j>=arr.length)return p;
      [arr[i],arr[j]]=[arr[j],arr[i]];return arr;
    });
  }

  async function aiGen(){
    if(!aiTxt.trim())return;
    setAiLoading(true);
    try{
      const txt=await callClaude('You are an expert higher-education fundraising copywriter. Write warm, genuine, human email body copy per the instruction. 2-3 short paragraphs. No bullet lists. Return ONLY the body text.',aiTxt,500);
      const bb=blocks.find(b=>b.type==='body');
      if(bb){setBlocks(p=>p.map(b=>b.id===bb.id?{...b,content:{...b.content,text:txt.trim()}}:b));setSelId(bb.id);toast('AI copy generated','success','✨');}
    }catch(e){toast('AI unavailable. Check API connection.','error','❌');}
    setAiLoading(false);
  }

  const PROVS=[
    {id:'gmail',label:'Gmail (OAuth 2.0)',icon:'📧',ok:true},
    {id:'outlook',label:'Outlook / Exchange',icon:'📨',ok:true},
    {id:'sfmc',label:'Salesforce Marketing Cloud',icon:'☁️',ok:true},
    {id:'smtp',label:'Custom SMTP',icon:'⚙️',ok:false},
    {id:'sendgrid',label:'SendGrid',icon:'📬',ok:false},
    {id:'emma',label:'Emma by Marigold',icon:'💌',ok:false},
    {id:'constantcontact',label:'Constant Contact',icon:'📮',ok:false},
    {id:'luminate',label:'Luminate Online (Blackbaud)',icon:'🔵',ok:false},
  ];

  return (
    <div>
      {showTest&&(
        <div className="overlay" onClick={()=>setShowTest(false)}>
          <div className="modal" style={{width:460}} onClick={e=>e.stopPropagation()}>
            <div className="mh">
              <div>
                <div style={{fontSize:15,fontWeight:800}}>Send Test Email</div>
                <div style={{fontSize:11,color:'var(--ink45)',marginTop:2}}>Preview in a real inbox before adding to a sequence</div>
              </div>
              <button className="ico-btn" onClick={()=>setShowTest(false)}>✕</button>
            </div>
            <div className="mb">
              <label className="fl">Delivery Provider</label>
              <select className="fi fsel" style={{marginBottom:14}} value={prov} onChange={e=>setProv(e.target.value)}>
                {PROVS.map(p=><option key={p.id} value={p.id}>{p.icon} {p.label}{p.ok?' (connected)':''}</option>)}
              </select>
              <label className="fl">Send Test To</label>
              <input className="fi" style={{marginBottom:14}} value={testEmail} onChange={e=>setTestEmail(e.target.value)} placeholder="your@email.edu"/>
              <label className="fl">Preview As</label>
              <select className="fi fsel" style={{marginBottom:14}}>
                <option>Margaret K., Class of 09, $2,500 last gift</option>
                <option>Robert H., 28yr donor, $25,000 last gift</option>
                <option>James P., lapsed 6 months, no recent signal</option>
              </select>
              <div style={{background:'var(--s2)',borderRadius:10,padding:'10px 14px',fontSize:12,color:'var(--ink70)',lineHeight:1.7}}>
                <strong>From:</strong> {fromName}<br/>
                <strong>Subject:</strong> {fillVars(subject,'Margaret')}<br/>
                <strong>Via:</strong> {(PROVS.find(p=>p.id===prov)||PROVS[0]).label}
              </div>
            </div>
            <div className="mf">
              <button className="btn btn-s" onClick={()=>setShowTest(false)}>Cancel</button>
              <button className="btn btn-p" onClick={()=>{toast('Test email queued','success','📤');setShowTest(false);}}>Send Test</button>
            </div>
          </div>
        </div>
      )}

      <div className="ph">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div className="pt">Email Designer</div>
            <div className="ps">Block-based email builder with merge tokens, AI copy assist, and multi-provider delivery</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

// ─── SMS Designer ──────────────────────────────────────────────
function SMSDesignerPage() {
  const [body,setBody] = useState('Hi {{first_name}}, this is {{agent_name}} from {{university}}. Your continued support means so much to all of us. Thank you from the bottom of our hearts.');
  const [prov,setProv] = useState('twilio');
  const [showToks,setShowToks] = useState(false);
  const [prevFname,setPrevFname] = useState('Margaret');
  const [aiTxt,setAiTxt] = useState('');
  const [aiLoading,setAiLoading] = useState(false);
  const [tab,setTab] = useState('compose');

  const MAX=160,len=body.length,parts=Math.ceil(len/MAX)||1,pct=Math.min((len/MAX)*100,100);
  const barColor=pct>90?'#dc2626':pct>70?'#c2853a':'#2a8c7e';

  const PROVS=[
    {id:'twilio',lbl:'Twilio',icon:'📱',ok:true},
    {id:'signalvine',lbl:'Signal Vine (Higher-Ed)',icon:'🌿',ok:false},
    {id:'mobile_commons',lbl:'Mobile Commons (Higher-Ed)',icon:'📲',ok:false},
    {id:'tatango',lbl:'Tatango',icon:'⚡',ok:false},
    {id:'bandwidth',lbl:'Bandwidth',icon:'📡',ok:false},
    {id:'eztext',lbl:'EZTexting',icon:'💭',ok:false},
    {id:'thinkbroadcast',lbl:'ThinkBroadcast (Higher-Ed)',icon:'🔊',ok:false},
    {id:'salesmsg',lbl:'Salesmessage',icon:'💬',ok:false},
  ];

  async function aiGen(){
    if(!aiTxt.trim())return;
    setAiLoading(true);
    try{
      const txt=await callClaude('You are an expert higher-ed fundraising SMS copywriter. Write a SINGLE text message under 160 characters. Warm and human, no corporate-speak. Return ONLY the message text.',aiTxt,200);
      setBody(txt.trim().replace(/^["']|["']$/g,''));
      toast('SMS copy generated','success','✨');
    }catch(e){toast('AI unavailable','error','❌');}
    setAiLoading(false);
  }

  return (
    <div>
      <div className="ph">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div className="pt">SMS Designer</div>
            <div className="ps">Compose, preview, and send text messages through higher-ed specialist SMS platforms</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-s btn-sm" onClick={()=>toast('SMS template saved','success','💾')}>💾 Save Template</button>
            <button className="btn btn-p btn-sm" onClick={()=>toast('SMS added to approval queue','success','✅')}>Add to Queue</button>
          </div>
        </div>
        <div className="tab-bar" style={{marginTop:16}}>
          {[['compose','✍️ Compose'],['templates','📚 Templates'],['compliance','🔒 TCPA Compliance']].map(([id,lbl])=>(
            <button key={id} className={'tab-btn'+(tab===id?' active':'')} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>
      </div>

      {tab==='compose'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:20}}>
          <div>
            <div className="card" style={{marginBottom:16}}>
              <div className="ch">
                <span className="ct">Message Body</span>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <button className="btn btn-g btn-sm" onClick={()=>setShowToks(!showToks)}>{'{}'} Tokens</button>
                  <select className="fi fsel" value={prov} onChange={e=>setProv(e.target.value)} style={{fontSize:11,padding:'5px 26px 5px 9px',width:200}}>
                    {PROVS.map(p=><option key={p.id} value={p.id}>{p.icon} {p.lbl}{p.ok?' (active)':''}</option>)}
                  </select>
                </div>
              </div>
              <div className="cb">
                {showToks&&<div style={{marginBottom:14}}>{MERGE_TOKENS.slice(0,12).map(t=>(
                  <span key={t.tok} className="tok" onClick={()=>{setBody(b=>b+t.tok);toast('Inserted: '+t.tok,'success','📋');}}>{t.tok}</span>
                ))}</div>}
                <textarea className="fi fta" rows={5} value={body} onChange={e=>setBody(e.target.value)}
                  placeholder="Type your SMS... use {{first_name}} to personalize" style={{marginBottom:10,resize:'vertical'}}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{flex:1,marginRight:16}}>
                    <div style={{height:4,background:'rgba(26,29,35,.08)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:pct+'%',background:barColor,borderRadius:2,transition:'width .2s,background .2s'}}/>
                    </div>
                  </div>
                  <div style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:700,color:pct>90?'#dc2626':'var(--ink45)',flexShrink:0}}>{len}/{MAX}{parts>1?' ('+parts+' parts)':''}</div>
                </div>
                {parts>1&&<div style={{fontSize:11,color:'#c2853a',fontWeight:600,marginBottom:10}}>Multi-part SMS: carriers may split delivery. Keep under 160 characters for best results.</div>}
                <div style={{borderTop:'1px solid var(--ink08)',paddingTop:14,marginTop:4}}>
                  <label className="fl">AI SMS Writer</label>
                  <div style={{display:'flex',gap:8}}>
                    <input className="fi" value={aiTxt} onChange={e=>setAiTxt(e.target.value)} placeholder="Write a giving day urgency SMS for donors who gave last year but have not given yet this year..." style={{flex:1,fontSize:12}}/>
                    <button className="btn btn-p btn-sm" onClick={aiGen} disabled={aiLoading} style={{flexShrink:0}}>{aiLoading?'Writing...':'✨ Generate'}</button>
                  </div>
                </div>
              </div>
            </div>
            <div className="card">
              <div className="ch"><span className="ct">Delivery Settings</span></div>
              <div className="cb">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div><label className="fl">Sender Number</label>
                    <select className="fi fsel">
                      <option>+1 (617) 555-0142 (Main Advancement)</option>
                      <option>+1 (617) 555-0198 (Campaign Line)</option>
                      <option>+1 (617) 555-0203 (Alumni Relations)</option>
                    </select>
                  </div>
                  <div><label className="fl">SMS Provider</label>
                    <select className="fi fsel" value={prov} onChange={e=>setProv(e.target.value)}>
                      {PROVS.map(p=><option key={p.id} value={p.id}>{p.lbl}</option>)}
                    </select>
                  </div>
                  <div><label className="fl">Opt-In List</label>
                    <select className="fi fsel">
                      <option>All SMS Consented (12,482)</option>
                      <option>Campaign Opted-In (3,241)</option>
                      <option>Event Opted-In (847)</option>
                      <option>Annual Fund List (5,120)</option>
                    </select>
                  </div>
                  <div><label className="fl">Quiet Hours (TCPA)</label>
                    <select className="fi fsel">
                      <option>8am to 9pm recipient local time (Default)</option>
                      <option>9am to 8pm recipient local time (Conservative)</option>
                      <option>No restriction (manual override)</option>
                    </select>
                  </div>
                </div>
                <div style={{marginTop:14,padding:'10px 14px',background:'var(--teall)',borderRadius:10,fontSize:11,color:'#2a8c7e',fontWeight:600}}>
                  STOP handler active: replies of STOP, UNSUBSCRIBE, CANCEL, END, or QUIT auto-remove the donor from all SMS lists and log the opt-out in the CRM.
                </div>
              </div>
            </div>
          </div>
          <div>
            <div className="card" style={{marginBottom:12}}>
              <div className="ch" style={{padding:'12px 16px'}}>
                <span className="ct">Live Preview</span>
                <input className="fi" value={prevFname} onChange={e=>setPrevFname(e.target.value)} placeholder="First name" style={{fontSize:11,padding:'4px 9px',width:86,borderRadius:6}}/>
              </div>
              <div className="cb" style={{display:'flex',justifyContent:'center',padding:20}}>
                <div className="sms-phone">
                  <div style={{display:'flex',justifyContent:'space-between',padding:'0 4px 8px',fontSize:9,color:'rgba(255,255,255,.4)'}}>
                    <span>9:41 AM</span><span>5G</span>
                  </div>
                  <div style={{textAlign:'center',color:'rgba(255,255,255,.35)',fontSize:10,marginBottom:10}}>

                    <span style={{fontSize:9,opacity:.6}}>+1 (617) 555-0142</span>

                  <div className="bubble bout">{fillVars(body,prevFname)||'Your message appears here...'}</div>
                  <div className="bubble bin" style={{marginTop:8}}>Thank you so much! That means a lot.</div>
                  <div style={{textAlign:'center',marginTop:10}}>
                    <div style={{display:'inline-block',background:'rgba(255,255,255,.06)',borderRadius:10,padding:'5px 9px'}}>
                      <span style={{fontSize:9,color:'rgba(255,255,255,.3)'}}>Reply STOP to opt out</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div className="card">
              <div className="ch" style={{padding:'12px 16px'}}><span className="ct">SMS Benchmarks</span></div>
              <div style={{padding:'14px 16px'}}>
                {[['Open Rate','98%','vs 22% email'],['Reply Rate','45%','vs 6% email'],['Opt-Out Rate','0.3%','TCPA compliant'],['Delivery Rate','99.1%','via Twilio']].map(([l,v,s])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,padding:'9px 12px',background:'var(--s2)',borderRadius:10}}>
                    <div><div style={{fontSize:12,fontWeight:600}}>{l}</div><div style={{fontSize:10,color:'var(--ink45)',marginTop:1}}>{s}</div></div>
                    <div style={{fontSize:16,fontWeight:800,color:'var(--ink)',fontFamily:'var(--mono)'}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==='templates'&&(

            <div key={tpl.id} className="card" style={{cursor:'pointer',transition:'transform .15s'}}

              onMouseLeave={e=>e.currentTarget.style.transform='none'}>
              <div className="cb">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{tpl.name}</div>
                    <div style={{fontSize:10,color:'var(--ink45)',marginTop:2}}>Agent: {tpl.agent}</div>

                <div style={{fontSize:12,color:'var(--ink70)',lineHeight:1.6,fontStyle:'italic',background:'var(--s2)',padding:'10px 12px',borderRadius:10,marginBottom:10}}>
                  {'"'}{tpl.body.slice(0,140)}{tpl.body.length>140?'...':''}{'"'}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--ink45)',fontFamily:'var(--mono)'}}>

              </div>

                style={{padding:'8px 16px',borderRadius:14,border:activeCat===cat.key?'2px solid #2a8c7e':'1.5px solid var(--ink08)',background:activeCat===cat.key?'#e4f4f1':'var(--surface)',color:activeCat===cat.key?'#2a8c7e':'var(--ink70)',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:7,transition:'all .15s'}}>
                {cat.icon} {cat.label}
                {cnt>0&&<span style={{background:'#16a34a',color:'#fff',fontSize:9,fontWeight:800,padding:'1px 5px',borderRadius:8}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
      )}

      {filtered.length===0&&<div style={{textAlign:'center',padding:'60px',color:'var(--ink45)'}}>No integrations match your search.</div>}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
        {filtered.map(item=>(
          <div key={item.id} className={'int-card '+item.status} onClick={()=>setSelInt(item)}>

            </div>
            <div style={{fontSize:11,color:'var(--ink45)',lineHeight:1.55}}>{item.desc}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span className="badge bg-slate" style={{fontFamily:'var(--mono)'}}>{item.badge}</span>

    </div>

}

// ─── Direct Mail ───────────────────────────────────────────────
function DirectMailPage() {
  const [prov,setProv] = useState('handwrytten');
  const [aiLoading,setAiLoading] = useState(false);
  const [noteBody,setNoteBody] = useState('Dear {{first_name}},\n\nThank you for your incredible generosity over the years. Your gift has made a lasting difference in the lives of our students, and we are deeply grateful for your continued support of {{university}}.\n\nWith heartfelt gratitude,\n{{agent_name}}');
  const [aiTxt,setAiTxt] = useState('');

  async function aiGenNote(){
    if(!aiTxt.trim())return;
    setAiLoading(true);
    try{
      const txt=await callClaude('You are an expert fundraising copywriter writing handwritten card notes for university donors. Write a warm, brief, personal note under 120 words. No bullet lists. Sign as {{agent_name}}. Return ONLY the note text.',aiTxt,250);
      setNoteBody(txt.trim());
      toast('Note copy generated','success','✍️');
    }catch(e){toast('AI unavailable','error','❌');}
    setAiLoading(false);
  }

  return (
    <div>
      <div className="ph">
        <div className="pt">Direct Mail + Handwritten Notes</div>
        <div className="ps">Physical mail automation: handwritten notes, printed letters, and personalized mailers at scale</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20}}>
        <div>
          <div className="card">
            <div className="ch"><span className="ct">Note Composer</span></div>
            <div className="cb">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                <div><label className="fl">Delivery Provider</label>
                  <select className="fi fsel" value={prov} onChange={e=>setProv(e.target.value)}>
                    <option value="handwrytten">✍️ Handwrytten (configured)</option>
                    <option value="postgrid">📦 PostGrid</option>
                    <option value="lob">📬 Lob</option>
                    <option value="pfl">🖨️ Printing for Less</option>
                  </select>
                </div>
                <div><label className="fl">Card Style</label>
                  <select className="fi fsel">
                    <option>University Branded Card</option><option>Personal Notecard</option>
                    <option>Seasonal (Holiday)</option><option>Impact Report Insert</option><option>Annual Fund Card</option>
                  </select>
                </div>
                <div><label className="fl">Trigger / Occasion</label>
                  <select className="fi fsel">
                    <option>Major gift thank you (post-commitment)</option><option>Gift anniversary</option>
                    <option>Lapse recovery (personal touch)</option><option>Milestone giving level reached</option>
                    <option>Birthday outreach</option><option>Reunion year acknowledgment</option>
                  </select>
                </div>
                <div><label className="fl">Handwriting Style</label>
                  <select className="fi fsel">
                    <option>Warm casual script</option><option>Formal cursive</option>
                    <option>Clean print</option><option>Officer personal style (upload sample)</option>
                  </select>
                </div>
              </div>
              <label className="fl">Note Body</label>
              <textarea className="fi fta" rows={7} value={noteBody} onChange={e=>setNoteBody(e.target.value)} style={{marginBottom:14}}/>
              <div style={{background:'var(--s2)',borderRadius:10,padding:'10px 14px',fontSize:11,color:'var(--ink45)',marginBottom:14,lineHeight:1.6}}>
                {noteBody.length} characters. Aim for ~120 words for handwritten notes. Tokens like {'{{first_name}}'} will be personalized per recipient.
              </div>
              <div style={{borderTop:'1px solid var(--ink08)',paddingTop:14}}>
                <label className="fl">AI Note Writer</label>
                <div style={{display:'flex',gap:8}}>
                  <input className="fi" value={aiTxt} onChange={e=>setAiTxt(e.target.value)}
                    placeholder="Write a heartfelt thank you note for a donor who just made their first major gift after 10 years of annual giving..." style={{flex:1,fontSize:12}}/>
                  <button className="btn btn-p btn-sm" onClick={aiGenNote} disabled={aiLoading} style={{flexShrink:0}}>{aiLoading?'Writing...':'✍️ Generate'}</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="ch" style={{padding:'12px 16px'}}><span className="ct">Note Preview</span></div>
            <div style={{padding:'16px'}}>
              <div style={{background:'#fffef5',border:'1px solid #e8e4d0',borderRadius:12,padding:'24px 22px',fontFamily:'Georgia,serif',fontSize:13,lineHeight:1.85,color:'#2c2416',minHeight:220,boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
                {fillVars(noteBody,'Margaret').split('\n').map((line,i)=>(
                  <div key={i} style={{marginBottom:line===''?8:0}}>{line||'\u00A0'}</div>
                ))}
              </div>
              <div style={{marginTop:10,fontSize:10,color:'var(--ink45)',textAlign:'center'}}>Approximate handwritten card preview</div>
            </div>
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div className="ch" style={{padding:'12px 16px'}}><span className="ct">Send Details</span></div>
            <div style={{padding:'14px 16px'}}>
              <label className="fl">Recipient Segment</label>
              <select className="fi fsel" style={{marginBottom:10}}>
                <option>Selected donors (5 selected)</option><option>All major gift donors ($10K+)</option>
                <option>Lapsed donors, 1 year+</option><option>Gift anniversary this month</option>
              </select>
              <label className="fl">Send Date</label>
              <input className="fi" type="date" style={{marginBottom:10}} defaultValue="2026-03-15"/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'10px 12px',background:'var(--s2)',borderRadius:10,marginBottom:10}}>
                <span style={{color:'var(--ink45)'}}>Estimated cost</span>
                <span style={{fontWeight:700}}>$4.50 / card (5 = $22.50)</span>
              </div>
              <button className="btn btn-p" style={{width:'100%',justifyContent:'center'}} onClick={()=>toast('5 handwritten notes queued via Handwrytten','success','✍️')}>
                Queue 5 Notes for Review
              </button>
            </div>
          </div>
          <div className="card">
            <div className="ch" style={{padding:'12px 16px'}}><span className="ct">Provider Status</span></div>
            <div style={{padding:'14px 16px'}}>
              {[['Handwrytten','configured','$3.50/card base'],['PostGrid','available','From $0.75/letter'],['Lob','available','From $0.55/letter'],['Printing for Less','available','From $1.20/piece']].map(([n,s,p])=>(
                <div key={n} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,padding:'8px 10px',background:'var(--s2)',borderRadius:8}}>
                  <div><div style={{fontSize:12,fontWeight:700}}>{n}</div><div style={{fontSize:10,color:'var(--ink45)'}}>{p}</div></div>
                  <span className={'badge '+(s==='configured'?'bg-teal':'bg-slate')}>{s}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ─────────────────────────────────────────────────
const PAGES = {
  email:     {lbl:'Email Designer',   icon:'✉️',  Component:EmailDesignerPage,  badge:null},
  sms:       {lbl:'SMS Designer',     icon:'💬',  Component:SMSDesignerPage,    badge:'8'},
  sequences: {lbl:'Sequences',        icon:'⑂',   Component:SequencesPage,      badge:'5'},
  directmail:{lbl:'Direct Mail',      icon:'✍️',  Component:DirectMailPage,     badge:null},
  integrations:{lbl:'Integrations',   icon:'🔗',  Component:IntegrationsPage,   badge:null},
  analytics: {lbl:'Analytics',        icon:'📊',  Component:AnalyticsPage,      badge:null},
};

function App() {
  const [page,setPage] = useState('email');

  useEffect(()=>{
    const h=e=>{if(PAGES[e.detail?.page])setPage(e.detail.page);};
    window.addEventListener('orbit:navigate',h);
    return ()=>window.removeEventListener('orbit:navigate',h);
  },[]);

  const connected=[
    {lbl:'Gmail',color:'#EA4335'},{lbl:'Exchange',color:'#0078D4'},
    {lbl:'Twilio SMS',color:'#F22F46'},{lbl:'Handwrytten',color:'#8B5CF6'},
    {lbl:'RE NXT',color:'#004990'},{lbl:'Salesforce',color:'#00A1E0'},
  ];

  return (
    <ToastProvider>
      <div className="app">
        <div className="sb">
          <div className="sb-logo">
            <div className="logomark"><span>O</span></div>
            <span className="wordmark">Orbit</span>
          </div>
          <button className="back-btn" onClick={()=>window.location.href='orbit-dashboard.html'}>
            &#8592; Back to Dashboard
          </button>
          <div className="nav-sec">
            <div className="nav-lbl">Communications Hub</div>
            {Object.entries(PAGES).map(([id,pg])=>(
              <button key={id} className={'nav-item'+(page===id?' active':'')} onClick={()=>setPage(id)}>
                <span className="nav-icon">{pg.icon}</span>
                <span className="nav-label">{pg.lbl}</span>
                {pg.badge&&<span className="nav-badge">{pg.badge}</span>}
              </button>
            ))}
          </div>
          <div className="sb-foot">
            <div style={{margin:'0 2px 6px',padding:'10px 12px',background:'rgba(42,140,126,.1)',borderRadius:10,border:'1px solid rgba(42,140,126,.2)'}}>
              <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Active Channels</div>
              {connected.map(ch=>(
                <div key={ch.lbl} style={{display:'flex',alignItems:'center',fontSize:10,color:'rgba(255,255,255,.5)',marginBottom:4}}>
                  <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:ch.color,marginRight:7,flexShrink:0}}/>
                  {ch.lbl}
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="main">
          <div className="topbar">
            <div>
              <div className="topbar-title">Communications Hub</div>
              <div className="topbar-sub">Email + SMS designer, sequences, direct mail, and delivery integrations</div>
            </div>
            <div className="ta">
              <button className="btn btn-s btn-sm" onClick={()=>toast('All integrations syncing...','success','🔄')}>Sync All</button>
              <button className="btn btn-p btn-sm" onClick={()=>setPage('sequences')}>View Sequences</button>
              <div style={{width:34,height:34,borderRadius:'50%',background:'#2a8c7e',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,cursor:'pointer',flexShrink:0}}>AR</div>
            </div>
          </div>
          <div className="content">
            <Pg.Component/>
          </div>
        </div>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
