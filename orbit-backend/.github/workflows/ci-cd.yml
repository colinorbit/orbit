name: Orbit CI/CD

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:   # Manual trigger from GitHub UI

# ─── Cancel in-progress runs on new push (saves compute) ─────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Environment variables ────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/orbit-api

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Lint + Security Audit
  # Fast checks — catches style issues and known vulnerabilities before tests
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orbit-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: orbit-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high
        # Note: audit failures are warnings in CI — address before shipping to prod
        continue-on-error: true

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Tests
  # Runs against a real Postgres + Redis (matching production)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: orbit-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: orbit_test
          POSTGRES_PASSWORD: orbit_test_pw
          POSTGRES_DB: orbit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://orbit_test:orbit_test_pw@localhost:5432/orbit_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-not-for-production-at-all
      ANTHROPIC_API_KEY: test-key-mocked-in-tests
      ENABLE_EMAIL: "false"
      ENABLE_SMS: "false"
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: orbit-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: psql postgresql://orbit_test:orbit_test_pw@localhost:5432/orbit_test -f schema.sql

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: orbit-backend/coverage
          flags: backend
          fail_ci_if_error: false

      - name: Annotate test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Tests
          path: orbit-backend/coverage/junit.xml
          reporter: jest-junit
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: Docker Build
  # Builds the production image and scans for vulnerabilities
  # Only runs on push to main/staging (not PRs from forks)
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: orbit-backend
          file: orbit-backend/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true   # Load into local daemon for scanning

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # Don't fail CI on scan findings (review manually)
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: orbit-backend
          file: orbit-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: Deploy to Staging
  # Auto-deploys on push to staging branch
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.orbit.ai

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

            # Zero-downtime rolling update
            cd /var/www/orbit
            docker compose pull api
            docker compose up -d --no-deps --scale api=2 api
            sleep 15  # Wait for new containers to be healthy
            docker compose up -d --no-deps --scale api=1 api

            # Verify health
            curl -sf https://staging-api.orbit.ai/health || (echo "Health check failed" && exit 1)

            echo "✅ Staging deploy complete: $(date)"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Orbit Staging Deployed*\nBranch: `staging` | Commit: `${{ github.sha }}`\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5: Deploy to Production
  # Requires manual approval — never auto-deploys to prod
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.orbit.ai
      # GitHub environment protection rules: require reviewer approval
      # Set in: Repo → Settings → Environments → production → Required reviewers

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /var/www/orbit

            # Tag current image as rollback target
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rollback-$(date +%Y%m%d%H%M)

            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Zero-downtime deploy (PM2 cluster mode)
            pm2 reload orbit-api --update-env

            # Wait and verify
            sleep 20
            curl -sf https://api.orbit.ai/health || (
              echo "❌ Health check failed — rolling back"
              pm2 reload orbit-api --update-env  # Reload again from prev version
              exit 1
            )

            echo "✅ Production deploy complete: $(date)"
            echo "Commit: ${{ github.sha }}"

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          body: |
            ## Orbit API v${{ github.run_number }}

            **Deployed:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **By:** ${{ github.actor }}

            ### Changes
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 *Orbit Production Deployed*\nVersion: v${{ github.run_number }} | Commit: `${{ github.sha }}`\nBy: ${{ github.actor }}\nURL: https://app.orbit.ai"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Orbit Production Deploy FAILED*\nCommit: `${{ github.sha }}` | By: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
